{% extends "base.html" %}
{% block title %}DRE Ativuz{% endblock %}

{% block head %}
<style>
  .dre-wrap {
    height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .dre-wrap iframe {
    flex: 1;
    width: 100%;
    border: none;
    border-radius: 10px;
  }
  .dre-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 100%;
    color: var(--ink-3);
    font-size: 14px;
    text-align: center;
  }
  .dre-fallback a {
    color: var(--brand);
    font-weight: 600;
    text-decoration: none;
  }
</style>
{% endblock %}

{% block content %}
<div class="dre-wrap">
  <iframe
    src="https://fin-overview-buddy.lovable.app"
    title="DRE Ativuz"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    onerror="showFallback()"
    id="dre-frame"
  ></iframe>
  <div class="dre-fallback" id="dre-fallback">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
    <p>O site bloqueou a incorporação por questões de segurança.</p>
    <a href="https://fin-overview-buddy.lovable.app" target="_blank" rel="noopener noreferrer">
      Abrir DRE Ativuz em nova aba ↗
    </a>
  </div>
</div>

<script>
  const frame = document.getElementById('dre-frame');
  const fallback = document.getElementById('dre-fallback');

  frame.addEventListener('load', () => {
    try {
      // Se o frame carregou mas está em branco por bloqueio, tenta detectar
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (!doc || doc.body?.innerHTML === '') showFallback();
    } catch(e) {
      // Cross-origin — provavelmente carregou, não bloqueia
    }
  });

  function showFallback() {
    frame.style.display = 'none';
    fallback.style.display = 'flex';
  }

  // Timeout: se após 10s o frame ainda não carregou nada visível
  setTimeout(() => {
    try {
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (doc && doc.body?.innerHTML === '') showFallback();
    } catch(e) {}
  }, 10000);
</script>
{% endblock %}
